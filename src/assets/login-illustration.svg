<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" fill="none">
  <defs>
    <linearGradient id="lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- scattered dots -->
  <circle cx="60" cy="70" r="7" fill="#7c3aed"/>
  <circle cx="430" cy="60" r="9" fill="#7c3aed" opacity="0.8"/>
  <circle cx="120" cy="40" r="5" fill="#a78bfa"/>
  <circle cx="400" cy="120" r="5" fill="#f59e0b"/>
  <circle cx="70" cy="250" r="6" fill="#f59e0b"/>
  <circle cx="420" cy="250" r="6" fill="#a78bfa"/>
  <circle cx="250" cy="30" r="4" fill="#a78bfa"/>

  <!-- laptop -->
  <rect x="150" y="110" width="180" height="115" rx="10" fill="url(#screen)"/>
  <rect x="162" y="122" width="156" height="91" rx="6" fill="#4c1d95"/>
  <path d="M120 225 h240 l18 26 H102 z" fill="url(#lid)"/>
  <rect x="160" y="232" width="160" height="8" rx="4" fill="#ede9fe"/>

  <!-- lock on screen -->
  <rect x="186" y="150" width="44" height="40" rx="7" fill="#fbbf24"/>
  <path d="M193 150 v-8 a15 15 0 0 1 30 0 v8" stroke="#f59e0b" stroke-width="6" fill="none"/>
  <circle cx="208" cy="167" r="5" fill="#92400e"/>
  <rect x="205" y="167" width="6" height="12" rx="3" fill="#92400e"/>

  <!-- green check badge -->
  <circle cx="288" cy="150" r="26" fill="#22c55e"/>
  <path d="M276 150 l8 8 16 -17" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- gear -->
  <g transform="translate(150 250)" fill="#7c3aed">
    <circle r="16"/>
    <circle r="7" fill="#ede9fe"/>
    <g>
      <rect x="-3" y="-22" width="6" height="10" rx="2"/>
      <rect x="-3" y="12" width="6" height="10" rx="2"/>
      <rect x="-22" y="-3" width="10" height="6" rx="2"/>
      <rect x="12" y="-3" width="10" height="6" rx="2"/>
    </g>
  </g>

  <!-- key tile -->
  <rect x="312" y="232" width="58" height="46" rx="9" fill="#6d28d9"/>
  <g transform="translate(330 246)" fill="#ede9fe">
    <circle cx="6" cy="6" r="7" fill="none" stroke="#ede9fe" stroke-width="4"/>
    <rect x="10" y="9" width="22" height="4" rx="2"/>
    <rect x="26" y="9" width="4" height="9" rx="2"/>
  </g>
</svg>
