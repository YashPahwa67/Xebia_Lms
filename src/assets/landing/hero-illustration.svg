<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 470" fill="none" role="img" aria-label="Learning dashboard illustration">
  <defs>
    <linearGradient id="plum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#84117C"/><stop offset="1" stop-color="#6C1D5F"/>
    </linearGradient>
    <linearGradient id="velvet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6C1D5F"/><stop offset="1" stop-color="#4A1E47"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#01AC9F"/><stop offset="1" stop-color="#019b8f"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#6C1D5F"/><stop offset="1" stop-color="#84117C"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#4A1E47" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- decorative dots -->
  <circle cx="60" cy="70" r="8" fill="#84117C" opacity="0.8"/>
  <circle cx="556" cy="120" r="11" fill="#01AC9F"/>
  <circle cx="40" cy="330" r="6" fill="#FF6200" opacity="0.85"/>
  <circle cx="540" cy="380" r="7" fill="#84117C" opacity="0.5"/>
  <circle cx="120" cy="40" r="4" fill="#D3CCEC"/>

  <!-- main dashboard card -->
  <g filter="url(#soft)">
    <rect x="96" y="92" width="408" height="286" rx="26" fill="#ffffff"/>
  </g>
  <!-- window bar -->
  <circle cx="124" cy="120" r="5" fill="#FF6200" opacity="0.7"/>
  <circle cx="142" cy="120" r="5" fill="#FFC107" opacity="0.8"/>
  <circle cx="160" cy="120" r="5" fill="#01AC9F" opacity="0.8"/>
  <rect x="182" y="115" width="120" height="10" rx="5" fill="#DADCEA"/>
  <line x1="96" y1="140" x2="504" y2="140" stroke="#EDEAF1" stroke-width="1.5"/>

  <!-- sidebar -->
  <rect x="112" y="156" width="92" height="206" rx="16" fill="url(#velvet)"/>
  <rect x="126" y="172" width="64" height="14" rx="7" fill="#ffffff" opacity="0.85"/>
  <rect x="126" y="200" width="64" height="12" rx="6" fill="#ffffff"/>
  <rect x="126" y="224" width="64" height="12" rx="6" fill="#ffffff" opacity="0.25"/>
  <rect x="126" y="248" width="64" height="12" rx="6" fill="#ffffff" opacity="0.25"/>
  <rect x="126" y="272" width="64" height="12" rx="6" fill="#ffffff" opacity="0.25"/>

  <!-- stat tiles -->
  <rect x="224" y="160" width="84" height="58" rx="14" fill="url(#plum)"/>
  <rect x="316" y="160" width="84" height="58" rx="14" fill="url(#velvet)"/>
  <rect x="408" y="160" width="80" height="58" rx="14" fill="url(#teal)"/>
  <rect x="236" y="174" width="34" height="8" rx="4" fill="#ffffff" opacity="0.5"/>
  <rect x="236" y="190" width="46" height="14" rx="5" fill="#ffffff"/>
  <rect x="328" y="174" width="34" height="8" rx="4" fill="#ffffff" opacity="0.5"/>
  <rect x="328" y="190" width="46" height="14" rx="5" fill="#ffffff"/>
  <rect x="420" y="174" width="30" height="8" rx="4" fill="#ffffff" opacity="0.5"/>
  <rect x="420" y="190" width="42" height="14" rx="5" fill="#ffffff"/>

  <!-- chart card -->
  <rect x="224" y="232" width="264" height="118" rx="16" fill="#F7F8FC"/>
  <rect x="240" y="246" width="80" height="10" rx="5" fill="#DADCEA"/>
  <g>
    <rect x="244" y="306" width="22" height="28" rx="5" fill="url(#bar)"/>
    <rect x="278" y="288" width="22" height="46" rx="5" fill="url(#bar)"/>
    <rect x="312" y="296" width="22" height="38" rx="5" fill="url(#bar)"/>
    <rect x="346" y="276" width="22" height="58" rx="5" fill="url(#bar)"/>
    <rect x="380" y="300" width="22" height="34" rx="5" fill="#D3CCEC"/>
    <rect x="414" y="284" width="22" height="50" rx="5" fill="#01AC9F"/>
    <rect x="448" y="294" width="22" height="40" rx="5" fill="#D3CCEC"/>
  </g>

  <!-- graduation cap -->
  <g transform="translate(470 56) rotate(8)">
    <path d="M0 22 L48 4 L96 22 L48 40 Z" fill="url(#plum)"/>
    <path d="M28 32 L28 52 Q48 64 68 52 L68 32 L48 40 Z" fill="#4A1E47"/>
    <rect x="94" y="22" width="4" height="26" rx="2" fill="#4A1E47"/>
    <circle cx="96" cy="50" r="6" fill="#01AC9F"/>
  </g>

  <!-- books -->
  <g transform="translate(70 372)">
    <rect x="0" y="34" width="118" height="20" rx="4" fill="#6C1D5F"/>
    <rect x="8" y="16" width="118" height="20" rx="4" fill="#84117C"/>
    <rect x="2" y="-2" width="118" height="20" rx="4" fill="#01AC9F"/>
    <rect x="10" y="3" width="10" height="10" rx="2" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- floating pill -->
  <g transform="translate(486 300)">
    <rect x="0" y="0" width="92" height="40" rx="20" fill="#ffffff" filter="url(#soft)"/>
    <circle cx="22" cy="20" r="12" fill="url(#teal)"/>
    <path d="M17 20 l4 4 l7 -8" stroke="#fff" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="42" y="13" width="40" height="6" rx="3" fill="#DADCEA"/>
    <rect x="42" y="23" width="26" height="6" rx="3" fill="#EDEAF1"/>
  </g>
</svg>
